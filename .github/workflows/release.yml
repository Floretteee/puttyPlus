name: Build and Release

on:
  workflow_dispatch:  # 仅允许手动触发
    inputs:
      version:
        description: '版本号 (例如: 1.0.0)'
        required: true
        type: string
      prerelease:
        description: '是否为预发布版本'
        required: false
        type: boolean
        default: false

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64
    
    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release
    
    - name: Build
      run: cmake --build build --config Release
    
    - name: Package artifacts
      run: |
        mkdir release
        Copy-Item build\Release\*.exe release\
        Copy-Item LICENCE release\
        Copy-Item README release\
      shell: pwsh
    
    - name: Create zip archive
      run: |
        Compress-Archive -Path release\* -DestinationPath puttyPlus-windows-x64.zip
      shell: pwsh
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: windows-build
        path: puttyPlus-windows-x64.zip
  
  build-linux:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential libgtk-3-dev
    
    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release
    
    - name: Build
      run: cmake --build build
    
    - name: Package artifacts
      run: |
        mkdir -p release
        find build -maxdepth 1 -type f -executable -exec cp {} release/ \;
        cp LICENCE README release/
    
    - name: Create tar archive
      run: |
        tar -czf puttyPlus-linux-x64.tar.gz -C release .
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: linux-build
        path: puttyPlus-linux-x64.tar.gz
  
  create-release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Download Windows artifacts
      uses: actions/download-artifact@v4
      with:
        name: windows-build
    
    - name: Download Linux artifacts
      uses: actions/download-artifact@v4
      with:
        name: linux-build
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ github.event.inputs.version }}
        name: Release v${{ github.event.inputs.version }}
        draft: false
        prerelease: ${{ github.event.inputs.prerelease == 'true' }}
        files: |
          puttyPlus-windows-x64.zip
          puttyPlus-linux-x64.tar.gz
        body: |
          ## PuTTY Plus v${{ github.event.inputs.version }}
          
          ### Changes
          - 请在此处添加更新日志
          
          ### Downloads
          - **Windows**: puttyPlus-windows-x64.zip
          - **Linux**: puttyPlus-linux-x64.tar.gz
          
          ### Installation
          #### Windows
          1. 下载 `puttyPlus-windows-x64.zip`
          2. 解压到任意目录
          3. 运行 `putty.exe` 或其他工具
          
          #### Linux
          1. 下载 `puttyPlus-linux-x64.tar.gz`
          2. 解压: `tar -xzf puttyPlus-linux-x64.tar.gz`
          3. 运行相应的可执行文件
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
